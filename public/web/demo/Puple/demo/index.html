<script src="/static/index/js/jquery-3.2.1.min.js"></script>
<script src="/static/component/layui/layui.js"></script>
<script src="/static/component/pear/pear.js"></script>
<script>
    layui.use(['layer'], function(){
        var layer = layui.layer;
        var flag = 0;
        var type = '';
        var out_trade_no = '';
        
        // 获取订单号
        out_trade_no = $('.order-number').text().substr($('.order-number').text().lastIndexOf("：") + 1);

        // 支付方式选择
        $('.payment-option').click(function() {
            $('.payment-option').removeClass('active');
            $(this).addClass('active');
            flag = 1;
            
            if($(this).hasClass('wechat_pay')) {
                type = 'wxpay';
            } else if($(this).hasClass('ali_pay')) {
                type = 'alipay';
            } else if($(this).hasClass('qq_pay')) {
                type = 'qqpay';
            }
        });

        // 支付按钮点击
        $('.pay-button').click(function() {
            var amount = $('#payAmount').val();
            
            if(!amount || amount <= 0) {
                layer.msg('请输入正确的支付金额', {icon: 2});
                return;
            }
            
            if(flag == 0) {
                layer.msg('请先选择支付方式', {icon: 2});
                return;
            }
            
            window.location.href = '/demo/dopay?type=' + type + '&out_trade_no=' + out_trade_no + '&amount=' + amount;
        });

        // 限制输入金额的格式
        $('#payAmount').on('input', function() {
            var value = $(this).val();
            if(value.indexOf('.') != -1) {
                var decimal = value.substring(value.indexOf('.') + 1);
                if(decimal.length > 2) {
                    $(this).val(parseFloat(value).toFixed(2));
                }
            }
        });
    });
</script>
