<!-- 框 架 初 始 化 -->
<script>
    layui.use(['admin', 'jquery', 'layer', 'element', 'form'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var layelem = layui.element;
        var admin = layui.admin;
        let form = layui.form;


        // 框 架 初 始 化
        admin.render({
            "logo": {
                "title": "YPAY Admin",

            },
            "menu": {
                "data": "{$Request.root}/index/menu",
                "accordion": true,
                "control": false,
                "select": "0"
            },
            "tab": {
                "muiltTab": true,
                "keepState": true,
                "session": true,
                "tabMax": 30,
                "index": {
                    "id": "0",
                    "href": "{$Request.root}/index/home",
                    "title": "首页"
                }
            },
            "theme": {
                "defaultColor": "2",
                "defaultMenu": "dark-theme",
                "defaultHeader": "light-theme",
                "allowCustom": true,
                "banner": false
            },
            "colors": [{
                "id": "1",
                "color": "#2d8cf0",
                "second": "#ecf5ff"
            },
                {
                    "id": "2",
                    "color": "#36b368",
                    "second": "#f0f9eb"
                },
                {
                    "id": "3",
                    "color": "#f6ad55",
                    "second": "#fdf6ec"
                }, {
                    "id": "4",
                    "color": "#f56c6c",
                    "second": "#fef0f0"
                }, {
                    "id": "5",
                    "color": "#3963bc",
                    "second": "#ecf5ff"
                }
            ],
            "other": {
                "keepLoad": 100
            },
            "header": {
                message: false
            }
        });


        layelem.on('nav(layui_nav_right)', function (elem) {
            if ($(elem).hasClass('logout')) {
                layer.confirm('确定退出登录吗?', function (index) {
                    layer.close(index);
                    $.ajax({
                        url: '{$Request.root}/login/logout',
                        type: "POST",
                        dataType: "json",
                        success: function (res) {
                            if (res.code == 200) {
                                layer.msg(res.msg, {
                                    icon: 1
                                });
                                setTimeout(function () {
                                    location.href = '{$Request.root}/login/index';
                                }, 333)
                            }
                        }
                    });
                });
            } else if ($(elem).hasClass('password')) {
                layer.open({
                    type: 2,
                    maxmin: true,
                    title: '修改密码',
                    shade: 0.1,
                    area: ['300px', '300px'],
                    content: '{$Request.root}/index/pass'
                });
            } else if ($(elem).hasClass('cache')) {
                $.post('{$Request.root}/index/cache',
                    function (data) {
                        layer.msg(data.msg, {time: 1500});
                        location.reload()
                    });

            } else if ($(elem).hasClass('update')) {
                var downloadUrl = 'https://wwayc.lanzoub.com/b00wnajzqh';
                var maskedLink = 'https://wwayc.lanzoub.com/b00w****';
                var downloadPwd = 'e***j';
                layer.open({
                    type: 1,
                    title: 'YPAY系统检测更新',
                    shadeClose: true,
                    skin: 'layui-col-md4',
                    closeBtn: 1,
                    content: '<div class="setchmod bt-form" style="padding-bottom:40px;">\
                            <div class="update_title"><i class="layui-layer-ico layui-layer-ico0" style="position: absolute;top: 16px;left: 15px;_left: -40px;width: 30px;height: 30px;"></i><span>检测已是新版本，更新包在左侧在线更新菜单！</span></div>\
                            <div class="update_conter">\
                                <p>下载链接：<span class="masked-link">'+ maskedLink +'</span></p>\
                                <p>提取密码：<strong>'+ downloadPwd +'</strong></p>\
                                <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">\
                                    <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" onclick=\"copyUpdateValue(\''+ downloadUrl +'\')\">复制链接</button>\
                                    <button type="button" class="layui-btn layui-btn-warm layui-btn-sm" onclick=\"copyUpdateValue(\''+ downloadPwd +'\')\">复制密码</button>\
                                </div>\
                                <p class="update_tips" style="margin-top:12px;">点击“前往下载”将会在新标签打开链接。</p>\
                            </div>\
                        </div>\
                        <style>\
                            .update_title{overflow: hidden;position: relative;vertical-align: middle;margin-top: 10px;}\
                            .update_title .layui-layer-ico{display: block;left: 60px !important;top: 1px !important;}\
                            .update_title span{display: inline-block;color: #333;height: 30px;margin-left: 105px;margin-top: 3px;font-size: 20px;}\
                            .update_conter{background: #f9f9f9;border-radius: 4px;padding: 20px;margin: 15px 37px;margin-top: 15px;}\
                            .update_conter p{margin: 8px 0;font-size: 14px;}\
                            .update_conter .masked-link{font-weight:600;color:#5c6bc0;word-break:break-all;overflow-wrap:anywhere;display:inline-block;max-width:100%;}\
                            .update_tips{font-size: 13px;color:#999;}\
                        </style>',
                    btn: ['前往下载', '取消'],
                    yes: function(index){
                        window.open(downloadUrl, '_blank');
                        layer.close(index);
                    }
                });
                return;

            }else if ($(elem).hasClass('detection')) {
                $.post('{$Request.root}/index/detection',
                    function (data) {
                        layer.msg(data.msg, {time: 1500});
                    });

            }

        });

        window.copyUpdateValue = function(text){
            if(navigator.clipboard){
                navigator.clipboard.writeText(text).then(function(){
                    layer.msg('已复制到剪贴板');
                }).catch(function(){
                    fallbackCopy(text);
                });
            }else{
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text){
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try{
                document.execCommand('copy');
                layer.msg('已复制到剪贴板');
            }catch(e){
                layer.msg('复制失败，请手动复制');
            }
            document.body.removeChild(textarea);
        }

    })
</script>
</body>
</html>
