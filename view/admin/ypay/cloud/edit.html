{include file="public/footer"/}
<script>
    layui.use(['form', 'jquery',  'uploads'], function () {
        let form = layui.form;
        let $ = layui.jquery;
        
                //筛选通道类型
        form.on('select(type)',function(data){
            if(data.value == 1){
                $('#cloud_type').html('<option value="1">Mac - V3</option><option value="2">Uos</option><option value="3">五合一</option><option value="4">新版Mac</option>');
            }else{
                $('#cloud_type').html('<option value="1">QYBot</option>');
            }
            form.render('select');
        });
        
        // 根据云端类型看是否展示云端代理配置
        form.on('select(cloud_type)',function(data){
            if(data.value == 3 || data.value == 4){
                $('#proxy_basic').show();
            }else{
                $('#proxy_basic').hide();
            }
        });
        
        // 根据开关展示是否开启配置代理信息
        form.on('radio(cloud_proxy)',function(data){
            if(data.value == "open"){
                $('#proxy_info').show();
            }else{
                $('#proxy_info').hide();
            }
        });
        
        //建立编辑器
        
        form.on('submit(save)', function (data) {
            
            $.ajax({
                data: JSON.stringify(data.field),
                dataType: 'json',
                contentType: 'application/json',
                type: 'post',
                success: function (res) {
                    //判断有没有权限
                    if (res && res.code == 999) {
                        layer.msg(res.msg, {
                            icon: 5,
                            time: 2000,
                        })
                        return false;
                    } else if (res.code == 200) {
                        layer.msg(res.msg,{icon:1,time:1000}, function () {
                            parent.layer.close(parent.layer.getFrameIndex(window.name));//关闭当前页
                            parent.layui.table.reload("cloud");
                        });
                    } else {
                        layer.msg(res.msg,{icon:2,time:1000});
                    }
                }
            })
            return false;
        });
    })
</script>
</body>
</html>
