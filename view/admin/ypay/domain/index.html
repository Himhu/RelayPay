{include file="public/header" type='pear-container'/}
		<div class="layui-card">
			<div class="layui-card-body">
				<form class="layui-form" action="">
					<div class="layui-form-item">
                           
               <div class="layui-form-item layui-inline">
                   <label class="layui-form-label">用户ID</label>
                   <div class="layui-input-inline">
                       <input type="text" name="user_id" placeholder="" class="layui-input">
                   </div>
               </div>
               <div class="layui-form-item layui-inline">
                   <label class="layui-form-label">站点名称</label>
                   <div class="layui-input-inline">
                       <input type="text" name="sitename" placeholder="" class="layui-input">
                   </div>
               </div> 
                <div class="layui-form-item layui-inline">
 						<label class="layui-form-label">审核状态</label>
 						<div class="layui-input-inline">
 							<select name="status">
 								<option value="">请选择一个状态</option>
 								<option value="0">待审核</option>
 								<option value="1">审核通过</option>
 								<option value="2">拒绝通过</option>
 								<option value="-1">用户已删除</option>
 							</select>
 						</div>
 					</div>
                        <div class="layui-form-item layui-inline">
                       <button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query">
                           <i class="layui-icon layui-icon-search"></i>
                           查询
                       </button>
                       <button type="reset" class="pear-btn pear-btn-md">
                           <i class="layui-icon layui-icon-refresh"></i>
                           重置
                       </button>
                       </div>
                    </div>
				</form>
			</div>
		</div>
		<div class="layui-card">
			<div class="layui-card-body">
				<table id="domain" lay-filter="domain"></table>
			</div>
		</div>
        	<script type="text/html" id="toolbar">
			<button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
		        <i class="layui-icon layui-icon-add-1"></i>
		        新增
			</button>
			<button class="pear-btn pear-btn-danger pear-btn-md" lay-event="batchRemove">
		        <i class="layui-icon layui-icon-delete"></i>
		        删除
		    </button>
		</script>
		<script type="text/html" id="options">
			<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></button>
		    <button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>
		</script>
		{include file="public/footer"/}
        <script>
        layui.use(['table', 'form', 'jquery','common','laydate','soulTable'], function() {
            let table = layui.table;
            let form = layui.form;
            let $ = layui.jquery;
            let common = layui.common;
            let laydate = layui.laydate;
            let MODULE_PATH = "{$Request.root}/ypay.domain/";
            let soulTable = layui.soulTable;
            
            let cols = [
                [{
                        type: 'checkbox'
                    },  {
                       field: "id",
                       title: "ID",
                       unresize: "true",
                       align: "center"
                   },  {
                       field: "user_id",
                       title: "用户ID",
                       unresize: "true",
                       align: "center"
                   }, {
                       field: "sitename",
                       title: "站点名称",
                       unresize: "true",
                       align: "center",
                    
                   }, {
                       field: "siteurl",
                       title: "站点地址",
                       unresize: "true",
                       align: "center",
                       templet:function(d){
                            return '<a href="//'+ d.siteurl +'" target="_blank">'+ d.siteurl +'</a>';
                          
                       }
                   }, {
                       field: "status",
                       title: "状态",
                       unresize: "false",
                       align: "center",
                       templet:function(d){
                           if(d.delete_time != null){
                               return '<button type="button" class="layui-btn layui-btn-danger layui-btn-radius layui-btn-xs">用户已删除</button>';
                           }else{ 
                                if(d.status == 0){
                                    return '<button type="button" class="layui-btn layui-btn-warm layui-btn-radius layui-btn-xs">待审核</button>';
                                }else if(d.status == 1){
                                    return '<button type="button" class="layui-btn layui-btn-radius layui-btn-xs">审核通过</button>';
                                }else{
                                    return '<button type="button" class="layui-btn layui-btn-danger layui-btn-radius layui-btn-xs">拒绝通过</button>';
                                }
                           }

                       }
                   },{
                        title: '操作',
                        toolbar: '#options',
                        unresize: true,
                        align: 'center',
                        fixed: 'right',
                        width:130,
                    }
                ]
            ]

            table.render({
                elem: '#domain',
                id:'domain',
                url: MODULE_PATH + 'index',
                page: true,
                overflow: 'tips',
                cols: cols,
                cellMinWidth: 100,
                skin: 'line',
                toolbar: '#toolbar',
                defaultToolbar: [{
                    title: '刷新',
                    layEvent: 'refresh',
                    icon: 'layui-icon-refresh',
                }, 'filter', 'print', 'exports'],
                done: function () {
                    soulTable.render(this)
                }
            });

            table.on('tool(domain)', function(obj) {
                if (obj.event === 'remove') {
                    window.remove(obj);
                } else if (obj.event === 'edit') {
                    window.edit(obj);
                }
            });

            table.on('toolbar(domain)', function(obj) {
                if (obj.event === 'add') {
                    window.add();
                } else if (obj.event === 'refresh') {
                    window.refresh();
                } else if (obj.event === 'batchRemove') {
                    window.batchRemove(obj);
                }
            });

            form.on('submit(query)', function(data) {
                table.reload('domain', {
                    where: data.field,
                    page:{curr: 1}
                })
                
                return false;
            });
            
             window.add = function() {
                layer.open({
                    type: 2,
                    maxmin: true,
                    title: '新增审核域名',
                    shade: 0.1,
                    area: screen(),
                    content: MODULE_PATH + 'add'
                });
            }

            
            window.edit = function(obj) {
                layer.open({
                    type: 2,
                    maxmin: true,
                    title: '修改站点信息',
                    shade: 0.1,
                    area: screen(),
                    content: MODULE_PATH + 'edit/id/'+obj.data['id']
                });
            }
            //弹出窗设置 自己设置弹出百分比
            function screen() {
                if (typeof width !== 'number' || width === 0) {
                width = $(window).width() * 0.8;
                }
                if (typeof height !== 'number' || height === 0) {
                height = $(window).height() * 0.5;
                }
                return [width + 'px', height + 'px'];
            }


            window.remove = function(obj) {
                layer.confirm('确定要删除嘛?', {
                    icon: 3,
                    title: '提示'
                }, function(index) {
                    layer.close(index);
                    let loading = layer.load();
                    $.ajax({
                        url:MODULE_PATH + 'remove',
                        data:{id:obj.data['id']},
                        dataType: 'json',
                        type: 'POST',
                        success: function(res) {
                            layer.close(loading);
                            //判断有没有权限
                            if(res && res.code==999){
                                layer.msg(res.msg, {
                                    icon: 5,
                                    time: 2000, 
                                })
                                return false;
                            }else if (res.code==200) {
                                layer.msg(res.msg, {
                                    icon: 1,
                                    time: 1000
                                }, function() {
                                    obj.del();
                                });
                            } else {
                                layer.msg(res.msg, {
                                    icon: 2,
                                    time: 1000
                                });
                            }
                        }
                    })
                });
            }

            window.batchRemove = function(obj) {
                let data = table.checkStatus(obj.config.id).data;
                if (data.length === 0) {
                    layer.msg("未选中数据", {
                        icon: 3,
                        time: 1000
                    });
                    return false;
                }
                var ids = []
                var hasCheck = table.checkStatus('domain')
                var hasCheckData = hasCheck.data
                if (hasCheckData.length > 0) {
                    $.each(hasCheckData, function (index, element) {
                        ids.push(element.id)
                    })
                }
                layer.confirm('确定要删除这些嘛?', {
                    icon: 3,
                    title: '提示'
                }, function(index) {
                    layer.close(index);
                    let loading = layer.load();
                    $.ajax({
                        url:MODULE_PATH + 'batchRemove',
                        data:{ids:ids},
                        dataType: 'json',
                        type: 'POST',
                        success: function(res) {
                            layer.close(loading);
                            //判断有没有权限
                            if(res && res.code==999){
                                layer.msg(res.msg, {
                                    icon: 5,
                                    time: 2000, 
                                })
                                return false;
                            }else if (res.code==200) {
                                layer.msg(res.msg, {
                                    icon: 1,
                                    time: 1000
                                }, function() {
                                    table.reload('domain');
                                });
                            } else {
                                layer.msg(res.msg, {
                                    icon: 2,
                                    time: 1000
                                });
                            }
                        }
                    })
                });
            }

            window.refresh = function(param) {
                table.reload('domain');
            }
        })
    </script>
	</body>
</html>
